services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: secret
      APP_USER: dynfields
      APP_USER_PASSWORD: dynfields
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      DB_CONNECTION: oracle
      DB_HOST: oracle
      DB_PORT: 1521
      DB_DATABASE: FREEPDB1
      DB_USERNAME: dynfields
      DB_PASSWORD: dynfields
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    image: node:22-alpine
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  oracle-data:
